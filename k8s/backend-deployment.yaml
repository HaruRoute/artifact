apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 969658552435.dkr.ecr.us-east-1.amazonaws.com/haruroute/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://haruroute-db.c8l6wumq4nqe.us-east-1.rds.amazonaws.com:3306/chatbot_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false"
            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: haruroute-secret
                  key: RDS_PASSWORD
            - name: SPRING_PROFILES_INCLUDE
              value: ""
            - name: SPRING_FLYWAY_BASELINE_VERSION
              value: "0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: haruroute-secret
                  key: JWT_SECRET
            - name: KTO_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: haruroute-secret
                  key: KTO_SERVICE_KEY
            - name: ODSAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: haruroute-secret
                  key: ODSAY_API_KEY
            - name: KAKAO_REST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: haruroute-secret
                  key: KAKAO_REST_API_KEY
            - name: AI_SERVER_URL
              value: "http://ai-server-service:8000"
            - name: REDIS_HOST
              value: "redis"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx384m -XX:+UseContainerSupport"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
          # JVM 시작(~45초) 완료 전까지 트래픽 차단 (20회 × 5초 = 최대 100초 대기)
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            failureThreshold: 20
            periodSeconds: 5
          # 준비된 pod에만 트래픽 라우팅
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          # 응답 없는 pod 자동 재시작
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
      # graceful shutdown 시간 확보 (application.yml timeout-per-shutdown-phase: 30s + 여유)
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
