<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유즈케이스 다이어그램 - 관광지 추천 챗봇</title>
<style>
  body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; font-family: 'Segoe UI', sans-serif; }
  h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 6px; }
  p  { font-size: 13px; color: #888; margin-bottom: 24px; }
  svg { background: #fff; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.10); }
  .uc { cursor: default; }
  .uc ellipse { transition: fill 0.15s; }
  .uc:hover ellipse { fill: #dbeafe; }
  .uc:hover text { font-weight: 700; }
</style>
</head>
<body>
<h1>관광지 추천 챗봇 — 유즈케이스 다이어그램</h1>
<p>UML Use Case Diagram</p>
<svg id="svg" width="1120" height="780" xmlns="http://www.w3.org/2000/svg"></svg>

<script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

// ── 액터 그리기 (stick figure) ──────────────────────────────────
function drawActor(cx, cy, label, color = '#1a1a2e') {
  const g = el('g', {});
  const R = 18;
  g.appendChild(el('circle', { cx, cy, r: R, fill: '#eef2ff', stroke: color, 'stroke-width': 2 }));
  g.appendChild(el('line',   { x1:cx, y1:cy+R, x2:cx, y2:cy+R+44, stroke:color, 'stroke-width':2 }));
  g.appendChild(el('line',   { x1:cx-26, y1:cy+R+16, x2:cx+26, y2:cy+R+16, stroke:color, 'stroke-width':2 }));
  g.appendChild(el('line',   { x1:cx, y1:cy+R+44, x2:cx-20, y2:cy+R+72, stroke:color, 'stroke-width':2 }));
  g.appendChild(el('line',   { x1:cx, y1:cy+R+44, x2:cx+20, y2:cy+R+72, stroke:color, 'stroke-width':2 }));

  (label.split('\n')).forEach((line, i) => {
    g.appendChild(el('text', {
      x: cx, y: cy + R + 88 + i * 16,
      'text-anchor': 'middle', 'font-size': 13, 'font-weight': 700, fill: color
    }, line));
  });
  svg.appendChild(g);
  return { cx, cy };
}

// ── 유즈케이스(타원) 그리기 ──────────────────────────────────────
const RX = 78, RY = 22;
function drawUC(cx, cy, label, fillColor = '#eff6ff', strokeColor = '#3b82f6') {
  const g = el('g', { class: 'uc' });
  g.appendChild(el('ellipse', {
    cx, cy, rx: RX, ry: RY,
    fill: fillColor, stroke: strokeColor, 'stroke-width': 1.8
  }));
  const lines = label.split('\n');
  const lineH = 14;
  const startY = cy - (lines.length - 1) * lineH / 2;
  lines.forEach((line, i) => {
    g.appendChild(el('text', {
      x: cx, y: startY + i * lineH,
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'font-size': 11.5, fill: '#1e3a5f', 'font-weight': '600'
    }, line));
  });
  svg.appendChild(g);
  return { cx, cy };
}

// ── 타원 경계 교차점 계산 ────────────────────────────────────────
function ellipseEdge(ecx, ecy, fromX, fromY, rx=RX, ry=RY) {
  const angle = Math.atan2(fromY - ecy, fromX - ecx);
  return { x: ecx + rx * Math.cos(angle), y: ecy + ry * Math.sin(angle) };
}

// ── 연결선 그리기 ─────────────────────────────────────────────────
function connect(x1, y1, x2, y2, opts = {}) {
  const { dashed = false, label = '', color = '#94a3b8', arrow = false } = opts;
  const g = el('g', {});

  const dash = dashed ? '6,4' : 'none';
  const line = el('line', {
    x1, y1, x2, y2,
    stroke: color, 'stroke-width': 1.4,
    'stroke-dasharray': dash,
  });
  g.appendChild(line);

  if (arrow) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const AL = 10, AW = 5;
    const ax = x2 - AL * Math.cos(angle);
    const ay = y2 - AL * Math.sin(angle);
    const pts = `${x2},${y2} ${ax - AW*Math.sin(angle)},${ay + AW*Math.cos(angle)} ${ax + AW*Math.sin(angle)},${ay - AW*Math.cos(angle)}`;
    g.appendChild(el('polygon', { points: pts, fill: color }));
  }

  if (label) {
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const bg = el('rect', { x: mx - 38, y: my - 10, width: 76, height: 14, fill: '#fff', rx: 3, opacity: 0.85 });
    g.appendChild(bg);
    g.appendChild(el('text', {
      x: mx, y: my + 2,
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'font-size': 10, fill: '#6366f1', 'font-style': 'italic'
    }, label));
  }
  svg.insertBefore(g, svg.firstChild);
}

function connectActorToUC(ax, ay, uc) {
  const edge = ellipseEdge(uc.cx, uc.cy, ax, ay);
  connect(ax, ay, edge.x, edge.y);
}

function connectUCtoUC(from, to, opts = {}) {
  const e1 = ellipseEdge(from.cx, from.cy, to.cx, to.cy);
  const e2 = ellipseEdge(to.cx, to.cy, from.cx, from.cy);
  connect(e1.x, e1.y, e2.x, e2.y, { ...opts, arrow: true });
}

function connectUCtoExternal(uc, ex, opts = {}) {
  const edge = ellipseEdge(uc.cx, uc.cy, ex.cx, ex.cy);
  connect(edge.x, edge.y, ex.cx, ex.cy, opts);
}

// ══════════════════════════════════════════════════════════════════
// 1. 시스템 경계 박스
// ══════════════════════════════════════════════════════════════════
svg.appendChild(el('rect', {
  x: 175, y: 38, width: 710, height: 700,
  fill: '#fafbff', stroke: '#3b82f6', 'stroke-width': 2, rx: 10
}));
svg.appendChild(el('text', {
  x: 530, y: 65,
  'text-anchor': 'middle', 'font-size': 15, 'font-weight': 700, fill: '#1e3a5f'
}, '관광지 추천 챗봇 시스템'));

// 내부 그룹 구분선 (점선)
svg.appendChild(el('line', { x1:410, y1:80, x2:410, y2:720, stroke:'#cbd5e1', 'stroke-width':1, 'stroke-dasharray':'4,4' }));
svg.appendChild(el('line', { x1:630, y1:80, x2:630, y2:720, stroke:'#cbd5e1', 'stroke-width':1, 'stroke-dasharray':'4,4' }));

// 그룹 레이블
[['회원 관리', 292], ['챗봇 서비스', 520], ['지도/관리자', 750]].forEach(([t, x]) => {
  const bg = el('rect', { x: x-52, y: 76, width: 104, height: 18, fill: '#e0e7ff', rx: 9 });
  svg.appendChild(bg);
  svg.appendChild(el('text', { x, y: 89, 'text-anchor':'middle', 'font-size':10.5, fill:'#4338ca', 'font-weight':700 }, t));
});

// ══════════════════════════════════════════════════════════════════
// 2. 유즈케이스 정의
// ══════════════════════════════════════════════════════════════════

// 회원 관리 (좌측 열, cx=292)
const uc회원가입   = drawUC(292, 135, '회원가입');
const uc로그인     = drawUC(292, 210, '로그인');
const uc로그아웃   = drawUC(292, 285, '로그아웃');
const uc비밀번호   = drawUC(292, 360, '비밀번호 찾기');
const uc회원수정   = drawUC(292, 435, '회원정보 수정');
const uc회원탈퇴   = drawUC(292, 510, '회원 탈퇴');

// 챗봇 서비스 (중앙 열, cx=520)
const uc채팅질문   = drawUC(520, 165, '채팅 질문하기');
const uc빠른질문   = drawUC(520, 265, '빠른 질문 선택');
const uc관광추천   = drawUC(520, 375, '관광지 추천 받기');
const uc이력조회   = drawUC(520, 475, '채팅 이력 조회');

// 지도/관리자 (우측 열, cx=750)
const uc지도       = drawUC(750, 240, '지도 확인');
const uc문서업로드 = drawUC(750, 490, '문서 업로드');

// ══════════════════════════════════════════════════════════════════
// 3. 액터 정의
// ══════════════════════════════════════════════════════════════════
const 사용자 = drawActor(90, 290, '사용자', '#1e40af');
const 관리자 = drawActor(90, 540, '관리자', '#7c3aed');

// 외부 시스템 (박스 형태)
function drawExternalSystem(cx, cy, label, color) {
  const w = 100, h = 50;
  svg.appendChild(el('rect', { x: cx-w/2, y: cy-h/2, width:w, height:h, fill:'#f0fdf4', stroke:color, 'stroke-width':1.8, rx:6, 'stroke-dasharray':'5,3' }));
  svg.appendChild(el('text', { x:cx, y:cy-7, 'text-anchor':'middle', 'font-size':9.5, fill:'#166534', 'font-style':'italic' }, '«외부 시스템»'));
  svg.appendChild(el('text', { x:cx, y:cy+8, 'text-anchor':'middle', 'font-size':11.5, fill:color, 'font-weight':700 }, label));
  return { cx, cy };
}
const openai = drawExternalSystem(1010, 240, 'OpenAI GPT', '#15803d');
const kakao  = drawExternalSystem(1010, 480, 'Kakao Map', '#b45309');

// ══════════════════════════════════════════════════════════════════
// 4. 연결선 (순서 중요: insertBefore로 뒤에 삽입)
// ══════════════════════════════════════════════════════════════════

// 사용자 → 회원 관리
[uc회원가입, uc로그인, uc로그아웃, uc비밀번호, uc회원수정, uc회원탈퇴].forEach(uc => {
  connectActorToUC(사용자.cx, 사용자.cy, uc);
});

// 사용자 → 챗봇 서비스
[uc채팅질문, uc빠른질문, uc관광추천, uc이력조회].forEach(uc => {
  connectActorToUC(사용자.cx, 사용자.cy, uc);
});

// 사용자 → 지도
connectActorToUC(사용자.cx, 사용자.cy, uc지도);

// 관리자 → 문서업로드
connectActorToUC(관리자.cx, 관리자.cy, uc문서업로드);

// Include / Extend 관계
connectUCtoUC(uc빠른질문, uc채팅질문, { dashed:true, label:'«include»', color:'#6366f1' });
connectUCtoUC(uc채팅질문, uc관광추천, { dashed:true, label:'«include»', color:'#6366f1' });

// 외부 시스템 연결
connectUCtoExternal(uc관광추천, openai, { dashed:true, color:'#16a34a' });
connectUCtoExternal(uc지도, kakao, { dashed:true, color:'#b45309' });

// ══════════════════════════════════════════════════════════════════
// 5. 범례
// ══════════════════════════════════════════════════════════════════
const leg = [
  { x: 200, color: '#94a3b8', dash: 'none',  label: '연관 관계 (Association)' },
  { x: 430, color: '#6366f1', dash: '6,4',   label: '포함 관계 «include»' },
  { x: 640, color: '#16a34a', dash: '6,4',   label: '외부 시스템 연동' },
];
svg.appendChild(el('rect', { x:175, y:745, width:710, height:28, fill:'#f1f5f9', rx:'0 0 10 10' }));
leg.forEach(({ x, color, dash, label }) => {
  svg.appendChild(el('line', { x1:x, y1:759, x2:x+30, y2:759, stroke:color, 'stroke-width':1.8, 'stroke-dasharray':dash }));
  svg.appendChild(el('text', { x:x+36, y:763, 'font-size':11, fill:'#475569' }, label));
});
</script>
</body>
</html>
