services:

  mysql:
    image: mysql:8.0
    container_name: haruroute-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: chatbot_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --innodb-buffer-pool-size=128M
      --performance-schema=OFF
      --max-connections=50
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: haruroute-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      SPRING_PROFILES_INCLUDE: ""
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      JWT_SECRET: ${JWT_SECRET}
      KTO_SERVICE_KEY: ${KTO_SERVICE_KEY}
      ODSAY_API_KEY: ${ODSAY_API_KEY}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      AI_SERVER_URL: http://ai_server:8000
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseContainerSupport"
    mem_limit: 512m
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: haruroute-frontend
    ports:
      - "80:80"
    mem_limit: 64m
    depends_on:
      - backend

  ai_server:
    build: ./ai_server
    container_name: haruroute-ai-server
    ports:
      - "8000:8000"
    environment:
      GMS_API_KEY: ${GMS_API_KEY}
    mem_limit: 512m
    volumes:
      - chroma_data:/app/chroma_data

volumes:
  mysql_data:
  chroma_data:
